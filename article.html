<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Article — Hemeroholics</title>
    <meta name="description" id="page-description" content="Read this article on Hemeroholics — daylily breeding insights powered by data science and AI.">
    <meta name="robots" content="index, follow">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="Hemeroholics">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #9a33b8;
            --primary-light: #b44fd4;
            --accent: #6370df;
            --accent-light: #8b95f0;
            --text: #e9ecef;
            --text-muted: #9ca3af;
            --bg-deep: #0a0a0f;
            --bg-card: rgba(22, 22, 35, 0.75);
            --border-subtle: rgba(154, 51, 184, 0.15);
            --border-glow: rgba(154, 51, 184, 0.35);
            --radius-lg: 1.25rem;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-deep); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; margin: 0; line-height: 1.6; }
        .bg-garden { position: fixed; inset: 0; z-index: -2; background: url('assets/garden.JPG') center/cover no-repeat; }
        .bg-overlay { position: fixed; inset: 0; z-index: -1; background: linear-gradient(180deg, rgba(10,10,15,0.88) 0%, rgba(10,10,15,0.82) 40%, rgba(10,10,15,0.92) 100%); backdrop-filter: blur(2px); }
        h1,h2,h3,h4 { font-family: 'Cormorant Garamond', serif; font-weight: 700; line-height: 1.15; }

        /* Nav */
        .nav-main { position: sticky; top: 0; z-index: 100; background: rgba(10,10,15,0.7); backdrop-filter: blur(20px) saturate(1.4); -webkit-backdrop-filter: blur(20px) saturate(1.4); border-bottom: 1px solid var(--border-subtle); }
        .nav-main.scrolled { background: rgba(10,10,15,0.92); }
        .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .nav-brand { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--primary-light), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; letter-spacing: -0.02em; }
        .nav-links { display: flex; align-items: center; gap: 0.25rem; list-style: none; margin: 0; padding: 0; }
        .nav-links a { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 0.9rem; border-radius: 0.5rem; color: var(--text-muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: all 0.2s ease; position: relative; }
        .nav-links a:hover, .nav-links a.active { color: var(--text); background: rgba(154,51,184,0.12); }
        .nav-links a.active::after { content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 1px; }
        .nav-links a i { font-size: 1rem; }
        .nav-toggle { display: none; background: none; border: 1px solid var(--border-subtle); color: var(--text); padding: 0.4rem 0.6rem; border-radius: 0.5rem; font-size: 1.25rem; cursor: pointer; }
        @media (max-width: 768px) {
            .nav-toggle { display: block; }
            .nav-links { display: none; position: absolute; top: 64px; left: 0; right: 0; flex-direction: column; background: rgba(10,10,15,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-subtle); padding: 0.75rem 1rem; gap: 0.25rem; }
            .nav-links.open { display: flex; }
            .nav-links a { width: 100%; padding: 0.75rem 1rem; }
        }

        /* Article layout */
        .article-wrap {
            max-width: 760px;
            margin: 0 auto;
            padding: 3rem 1.5rem 4rem;
        }
        .article-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 2rem;
            transition: color 0.2s;
        }
        .article-back:hover { color: var(--text); }
        .article-tag {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--primary-light);
            margin-bottom: 0.75rem;
        }
        .article-title {
            font-size: clamp(1.75rem, 5vw, 3rem);
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, var(--primary-light) 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .article-meta {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-bottom: 2.5rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-subtle);
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .article-content {
            font-size: 1.05rem;
            line-height: 1.85;
            color: var(--text);
        }
        .article-content h2 {
            font-size: 1.6rem;
            margin: 2.5rem 0 1rem;
            color: var(--text);
        }
        .article-content h3 {
            font-size: 1.3rem;
            margin: 2rem 0 0.75rem;
            color: var(--text);
        }
        .article-content p { margin-bottom: 1.25rem; }
        .article-content ul, .article-content ol {
            margin-bottom: 1.25rem;
            padding-left: 1.5rem;
        }
        .article-content li { margin-bottom: 0.5rem; }
        .article-content blockquote {
            border-left: 3px solid var(--primary);
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            background: rgba(154,51,184,0.06);
            border-radius: 0 0.5rem 0.5rem 0;
            color: var(--text-muted);
            font-style: italic;
        }
        .article-content code {
            background: rgba(154,51,184,0.12);
            padding: 0.15em 0.4em;
            border-radius: 0.25rem;
            font-size: 0.9em;
        }
        .article-content pre {
            background: rgba(10,10,15,0.8);
            border: 1px solid var(--border-subtle);
            border-radius: 0.75rem;
            padding: 1.25rem;
            overflow-x: auto;
            margin: 1.5rem 0;
        }
        .article-content pre code {
            background: none;
            padding: 0;
        }
        .article-content img {
            max-width: 100%;
            border-radius: 0.75rem;
            margin: 1.5rem 0;
        }

        /* Loading state */
        .article-loading {
            text-align: center;
            padding: 6rem 1.5rem;
            color: var(--text-muted);
        }
        .article-error {
            text-align: center;
            padding: 6rem 1.5rem;
        }
        .article-error h2 { color: var(--text); margin-bottom: 1rem; }
        .article-error p { color: var(--text-muted); }

        /* Footer */
        .footer { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 3rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; border-top: 1px solid var(--border-subtle); }
        .footer-copy { font-size: 0.8rem; color: var(--text-muted); }
        .footer-links { display: flex; gap: 1.5rem; }
        .footer-links a { font-size: 0.8rem; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
        .footer-links a:hover { color: var(--text); }

        .fade-in { opacity: 0; transition: opacity 0.5s ease; }
        .fade-in.visible { opacity: 1; }
    </style>
</head>
<body>
    <div class="bg-garden" aria-hidden="true"></div>
    <div class="bg-overlay" aria-hidden="true"></div>

    <nav class="nav-main" role="navigation" aria-label="Main navigation">
        <div class="nav-inner">
            <a href="index.html" class="nav-brand">Hemeroholics</a>
            <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false"><i class="bi bi-list"></i></button>
            <ul class="nav-links">
                <li><a href="index.html"><i class="bi bi-house-door"></i> Home</a></li>
                <li><a href="blog.html" class="active"><i class="bi bi-journal-text"></i> Blog</a></li>
                <li><a href="projects.html"><i class="bi bi-lightbulb"></i> Projects</a></li>
                <li><a href="tools.html"><i class="bi bi-tools"></i> Tools</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div id="article-loading" class="article-loading">
            <p>Loading article...</p>
        </div>
        <div id="article-error" class="article-error" style="display:none;">
            <h2>Article Not Found</h2>
            <p>This article doesn't exist or hasn't been published yet.</p>
            <a href="blog.html" class="article-back" style="margin-top:1.5rem;display:inline-flex;">
                <i class="bi bi-arrow-left"></i> Back to blog
            </a>
        </div>
        <article id="article-content" class="article-wrap fade-in" style="display:none;">
            <a href="blog.html" class="article-back"><i class="bi bi-arrow-left"></i> Back to blog</a>
            <div class="article-tag" id="article-tag"></div>
            <h1 class="article-title" id="article-title"></h1>
            <div class="article-meta">
                <span id="article-date"><i class="bi bi-calendar3"></i></span>
                <span id="article-read-time"><i class="bi bi-clock"></i></span>
            </div>
            <div class="article-content" id="article-body"></div>
        </article>
    </main>

    <footer class="footer" role="contentinfo">
        <p class="footer-copy">&copy; 2025 Hemeroholics &mdash; Cultivating beauty through data and passion</p>
        <nav class="footer-links" aria-label="Footer navigation">
            <a href="index.html">Home</a>
            <a href="blog.html">Blog</a>
            <a href="projects.html">Projects</a>
            <a href="tools.html">Tools</a>
        </nav>
    </footer>

    <script>
        // Nav
        const toggle = document.querySelector('.nav-toggle');
        const links = document.querySelector('.nav-links');
        toggle.addEventListener('click', () => { const open = links.classList.toggle('open'); toggle.setAttribute('aria-expanded', open); });
        const nav = document.querySelector('.nav-main');
        window.addEventListener('scroll', () => { nav.classList.toggle('scrolled', window.scrollY > 40); }, { passive: true });

        // API base URL — update after Railway deploy
        const API_BASE = window.location.hostname === 'localhost'
            ? 'http://localhost:8000'
            : 'https://your-railway-app.up.railway.app'; // TODO: replace with your Railway URL

        function formatDate(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        async function loadArticle() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            const loadingEl = document.getElementById('article-loading');
            const errorEl = document.getElementById('article-error');
            const contentEl = document.getElementById('article-content');

            if (!slug) {
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(API_BASE + '/api/articles/' + encodeURIComponent(slug));
                if (!res.ok) throw new Error('Not found');
                const article = await res.json();

                // Update page meta
                document.getElementById('page-title').textContent = article.title + ' — Hemeroholics Blog';
                const metaDesc = document.getElementById('page-description');
                if (metaDesc) metaDesc.setAttribute('content', article.excerpt);

                // Populate article
                document.getElementById('article-tag').textContent = article.tag || 'Article';
                document.getElementById('article-title').textContent = article.title;
                document.getElementById('article-date').innerHTML = '<i class="bi bi-calendar3"></i> ' + formatDate(article.published_at);
                document.getElementById('article-read-time').innerHTML = article.read_time
                    ? '<i class="bi bi-clock"></i> ' + article.read_time
                    : '';
                document.getElementById('article-body').innerHTML = article.content;

                loadingEl.style.display = 'none';
                contentEl.style.display = 'block';
                requestAnimationFrame(() => contentEl.classList.add('visible'));
            } catch {
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
            }
        }

        loadArticle();
    </script>
</body>
</html>
